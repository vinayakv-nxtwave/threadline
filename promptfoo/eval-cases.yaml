- description: "[44] multi-turn: opener has no signal, real issue only appears in the third message"
  vars:
    conversation:
      - { direction: inbound, body: "Hi" }
      - { direction: outbound, body: "Hi! How can we help you today?" }
      - { direction: inbound, body: "The mentor session for today got cancelled without notice, and I had cleared my whole evening for it" }
    expectedCategory: session
    expectedPriority: high

- description: "[45] multi-turn conversation that resolves to a thanks/no-action-needed message"
