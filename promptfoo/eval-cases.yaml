    expectedCategory: session
    expectedPriority: urgent

- description: "[106] escalating multi-turn, urgency inferred from a 15-minute deadline stated flatly"
  vars:
    conversation:
      - { direction: inbound, body: "Hey, my payment page is stuck loading" }
      - { direction: inbound, body: "It's been like this for 20 minutes" }
      - { direction: inbound, body: "The course session I paid for starts in 15 minutes and I still can't confirm the payment went through" }
    expectedCategory: payment
    expectedPriority: urgent

- description: "[107] same-day hard deadline stated calmly -- high, not urgent"
  vars:
    conversation:
      - { direction: inbound, body: "hi" }
      - { direction: inbound, body: "just letting you know the certificate download link seems broken" }
      - { direction: inbound, body: "also just realized today is the last day to submit for placement documentation and the link still isn't working" }
    expectedCategory: certificate
    expectedPriority: high

- description: "[108] negative control -- explicit low-urgency language paired with session content"
  vars:
    conversation:
      - { direction: inbound, body: "No rush at all, just wondering if there's a live session about DSA sometime in the coming weeks." }
    expectedCategory: session
    expectedPriority: low
