# Mirrors eval/classification-eval-set.json (ids 1-46) and
# eval/priority-stress-eval-set.json (ids 101-108). Append new cases here
# going forward -- no code changes needed, promptfoo picks them up
# automatically.

- description: "[1] straightforward certificate correction"
  vars:
    conversation:
      - { direction: inbound, body: "My certificate has the wrong spelling of my name, can you fix it?" }
    expectedCategory: certificate
    expectedPriority: medium

- description: "[2] payment failure with a real financial consequence at stake"
  vars:
    conversation:
      - { direction: inbound, body: "My EMI payment failed today, will I get charged a penalty?" }
    expectedCategory: payment
    expectedPriority: high

- description: "[3] time-critical session issue"
  vars:
    conversation:
      - { direction: inbound, body: "The live class link isn't working, class starts in 5 minutes!!" }
    expectedCategory: session
    expectedPriority: urgent

- description: "[4] being locked out is itself blocking"
  vars:
    conversation:
      - { direction: inbound, body: "I forgot my password and I'm locked out of my account" }
    expectedCategory: access
    expectedPriority: high

- description: "[5] a direct question is medium, not purely informational low"
  vars:
    conversation:
      - { direction: inbound, body: "Can someone explain the difference between a stack and a queue?" }
    expectedCategory: doubt
    expectedPriority: medium

- description: "[6] blocking technical issue with clear frustration"
  vars:
    conversation:
      - { direction: inbound, body: "The video keeps buffering and won't load at all, this is really frustrating" }
    expectedCategory: technical
    expectedPriority: high

- description: "[7] no signal at all, should stay general/medium rather than guessing"
  vars:
    conversation:
      - { direction: inbound, body: "Hi" }
