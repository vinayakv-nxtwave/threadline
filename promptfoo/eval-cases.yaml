    conversation:
      - { direction: inbound, body: "Hello" }
      - { direction: inbound, body: "I attended the DSA session yesterday" }
      - { direction: inbound, body: "Just wanted to say thanks, it was really useful" }
    expectedCategory: general
    expectedPriority: low

- description: "[46] the exact Hi-then-payment scenario this feature was built to fix"
  vars:
    conversation:
      - { direction: inbound, body: "Hi" }
      - { direction: inbound, body: "When will my next EMI be deducted?" }
