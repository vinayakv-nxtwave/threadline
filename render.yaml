services:
  - type: web
    name: threadline-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WHAPI_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false

  - type: web
    name: threadline-dashboard
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://threadline-backend-fc20.onrender.com
